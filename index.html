<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificador de Acesso Mobile</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            max-width: 600px; 
            margin: 0 auto; 
            background-color: #e9ecef;
        }
        .card { 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        h2 { 
            color: #495057; 
            font-size: 1em; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px; 
            margin-top: 0;
        }
        p { 
            word-wrap: break-word; 
            color: #212529; 
            font-size: 1.2em; 
            font-weight: 500;
            margin: 0;
        }
        .loading { color: #adb5bd; font-style: italic; }
        .highlight { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>User Agent (Navegador/Dispositivo)</h2>
        <p id="userAgent" class="loading">Carregando...</p>
    </div>

    <div class="card">
        <h2>Endereço IPv4 Público</h2>
        <p id="ipAddress" class="loading">Buscando IP...</p>
    </div>

    <div class="card">
        <h2>Gateway Identificado</h2>
        <p id="gateway" class="loading">Aguardando IP...</p>
    </div>

    <script>
        // Definição das faixas de IP repassadas por você
        const gateways = {
            "Santo Andre (SNE)": [
                "170.244.198.0/24", "170.244.199.0/24", "191.128.232.0/24",
                "191.128.233.0/24", "191.128.234.0/23", "191.128.236.0/24", "191.128.237.0/24"
            ],
            "Vila Anastacio (SPO)": [
                "189.76.168.0/22", "189.76.170.0/24", "189.76.172.0/23", "189.76.174.0/24"
            ]
        };

        // Converte o IP em formato de string para um número inteiro não assinado de 32 bits
        function ipToNumeric(ip) {
            return ip.split('.').reduce((acc, octet) => (acc << 8) + parseInt(octet, 10), 0) >>> 0;
        }

        // Verifica se um IP pertence a uma notação CIDR específica (ex: 170.244.198.0/24)
        function isIpInCidr(ip, cidr) {
            const [range, bits] = cidr.split('/');
            // Cria a máscara de sub-rede
            const mask = (-1 << (32 - parseInt(bits, 10))) >>> 0;
            // Compara os IPs mascarados
            return (ipToNumeric(ip) & mask) === (ipToNumeric(range) & mask);
        }

        // Procura o gateway correspondente ao IP informado
        function getGateway(ip) {
            for (const [gatewayName, cidrList] of Object.entries(gateways)) {
                for (const cidr of cidrList) {
                    if (isIpInCidr(ip, cidr)) {
                        return gatewayName;
                    }
                }
            }
            return "Desconhecido (Não pertence às faixas monitoradas)";
        }

        document.addEventListener("DOMContentLoaded", () => {
            // 1. Mostrar User Agent diretamente pelo navegador do dispositivo
            const uaElement = document.getElementById("userAgent");
            uaElement.textContent = navigator.userAgent;
            uaElement.classList.remove("loading");

            // 2. Buscar IP usando a API pública Ipify (já que o Github Pages é apenas frontend)
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(data => {
                    const userIp = data.ip;
                    
                    // Mostra o IP
                    const ipElement = document.getElementById("ipAddress");
                    ipElement.textContent = userIp;
                    ipElement.classList.remove("loading");

                    // Calcula e mostra o Gateway
                    const gatewayElement = document.getElementById("gateway");
                    const gatewayName = getGateway(userIp);
                    
                    gatewayElement.textContent = gatewayName;
                    gatewayElement.classList.remove("loading");
                    if (gatewayName.includes("SNE") || gatewayName.includes("SPO")) {
                        gatewayElement.classList.add("highlight");
                    }
                })
                .catch(error => {
                    console.error("Erro ao buscar o IP:", error);
                    document.getElementById("ipAddress").textContent = "Erro na rede. Verifique a conexão.";
                    document.getElementById("gateway").textContent = "Indisponível";
                });
        });
    </script>
</body>
</html>
